name: Bug report
description: Report a reproducible problem in token-saver
title: "bug: "
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug report.
        Please provide enough detail to reproduce the issue.

  - type: input
    id: version
    attributes:
      label: Version
      description: Which token-saver version are you using?
      placeholder: v0.1.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - Linux
        - macOS
        - Other
    validations:
      required: true

  - type: textarea
    id: command
    attributes:
      label: Command
      description: Exact command that triggered the issue
      placeholder: token-saver git status
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant output or logs
      description: Paste compact output, errors, and stack traces.
      render: shell
